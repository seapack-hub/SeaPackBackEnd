# =============================================================================
# SeaPackBackEnd - Application Configuration
# =============================================================================

spring.application.name=SeaPackBackEnd
server.address=0.0.0.0
server.port=8090

# ------------------------- Datasource -------------------------
spring.datasource.url=jdbc:mysql://localhost:3306/sea_pack?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
spring.datasource.username=${DB_USERNAME:root}
spring.datasource.password=${DB_PASSWORD:seapack}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.datasource.type=com.alibaba.druid.pool.DruidDataSource
spring.datasource.druid.initial-size=5
spring.datasource.druid.min-idle=5
spring.datasource.druid.max-active=20

# ------------------------- MyBatis -------------------------
# XML mapper file locations
mybatis.mapper-locations=classpath:mapper/**/*.xml
# Entity alias package
mybatis.type-aliases-package=org.seaPack.model
# Auto map underscore to camelCase
mybatis.configuration.map-underscore-to-camel-case=true
# Log SQL statements to stdout (disable in production)
mybatis.configuration.log-impl=org.apache.ibatis.logging.stdout.StdOutImpl

# ------------------------- PageHelper -------------------------
pagehelper.helper-dialect=mysql
pagehelper.reasonable=true
pagehelper.support-methods-arguments=true
pagehelper.params=count=countSql
pagehelper.page-size-zero=true

# ------------------------- Redis -------------------------
spring.data.redis.host=113.44.41.182
spring.data.redis.port=6379
spring.data.redis.password=${REDIS_PASSWORD:seapack}

# ------------------------- File Upload -------------------------
# Max single file size
spring.servlet.multipart.max-file-size=10MB
# Max total request size
spring.servlet.multipart.max-request-size=10MB

# ------------------------- AI Provider -------------------------
# Active AI provider name (options: aliyun, deepseek)
ai.active-provider=deepseek

# DeepSeek configuration
ai.providers.deepseek.api-key=${DEEPSEEK_API_KEY:youToken}
ai.providers.deepseek.base-url=https://api.deepseek.com/v1
ai.providers.deepseek.chat-model=deepseek-v4-pro
ai.providers.deepseek.embedding-model=text-embedding-3-small

# Aliyun (OpenAI compatible) configuration
ai.providers.aliyun.api-key=${ALIYUN_API_KEY:youToken}
ai.providers.aliyun.base-url=https://dashscope.aliyuncs.com/compatible-mode/v1
ai.providers.aliyun.chat-model=qwen-plus
ai.providers.aliyun.embedding-model=text-embedding-v1

# ------------------------- RSA Keys -------------------------
rsa.private-key=${RSA_PRIVATE_KEY:}
rsa.public-key=${RSA_PUBLIC_KEY:}

# ------------------------- Logging -------------------------
logging.level.org.springframework.data.redis=DEBUG

# ------------------------- AKTools -------------------------
aktools.base-url=http://127.0.0.1:8888

# ------------------------- Cache -------------------------
# Caffeine local cache
spring.cache.type=caffeine

# ------------------------- Stock Data (Parquet) -------------------------
# Daily K-line data directory
stock.parquet.dir=D:\\stockInfo\\dailyKline
# Instrument info directory
stock.instrument.parquet.dir=D:\\stockInfo\\instruments
# Dividend data directory
stock.dividend.parquet.dir=D:\\stockInfo\\dividendData
# Realtime quote directory (stock_realtime_quote_*.parquet)
stock.realtime.parquet.dir=D:\\stockInfo\\realtimeQuote

# ------------------------- Knowledge Base -------------------------
# File upload directory for knowledge base documents
ai.knowledge.upload-dir=uploads/knowledge

# ------------------------- Mail Notification -------------------------
# SMTP sender account (must enable SMTP service)
spring.mail.host=smtp.qq.com
spring.mail.port=587
spring.mail.username=your_email@qq.com
spring.mail.password=your_smtp_authorization_code
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.properties.mail.smtp.connectiontimeout=5000
spring.mail.properties.mail.smtp.timeout=5000
spring.mail.properties.mail.smtp.writetimeout=5000

# Notification switches (can be toggled independently)
notify.email.enabled=true
notify.sms.enabled=false

# ------------------------- Image Generation -------------------------
ai.image-generation.api-url=https://api.openai.com/v1/images/generations
ai.image-generation.model=dall-e-3
ai.image-generation.storage-dir=uploads/images
ai.image-generation.base-url=

# ------------------------- JWT -------------------------
# JWT signing secret (override via JWT_SECRET env var in production)
jwt.secret=${JWT_SECRET:SeaPackSecretKeyForJWTTokenGeneration2024ChangeThisInProduction}
# Token expiration in milliseconds (24 hours)
jwt.expiration=86400000

# ------------------------- CORS -------------------------
# Allowed origins for cross-origin requests (use specific domain in production)
cors.allowed-origins=*
